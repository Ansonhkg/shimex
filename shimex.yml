project:
  name: shimex
  package_manager: npm

runtime:
  host: 127.0.0.1
  port: 18765
  home: ~/.shimex

codex:
  source_app: auto
  managed_app_name: Shimex
  bundle_identifier: xyz.shimex.app
  managed_app_path: ~/Applications/Shimex.app
  profile_home: ~/.shimex/codex-profile
  user_data_dir: ~/.shimex/codex-user-data
  icon_path: icon.png
  seed_local_auth: true

providers:
  - id: cline-pass
    enabled: true
    models:
      refresh: on_start

  - id: lm-studio
    enabled: true
    endpoint: http://127.0.0.1:1234/v1
    models:
      refresh: on_start

  - id: openai-compatible
    enabled: true
    endpoint: ${OPENAI_COMPATIBLE_BASE_URL}
    auth:
      type: env
      name: OPENAI_COMPATIBLE_API_KEY
    models: []

  - id: openai-responses
    enabled: true
    endpoint: ${OPENAI_RESPONSES_BASE_URL}
    auth:
      type: env
      name: OPENAI_RESPONSES_API_KEY
    models: []

  - id: anthropic
    enabled: true
    endpoint: https://api.anthropic.com/v1
    auth:
      type: env
      name: ANTHROPIC_API_KEY
    models: []

  - id: deepseek
    enabled: true
    endpoint: https://api.deepseek.com/anthropic
    auth:
      type: env
      name: DEEPSEEK_API_KEY
    models:
      - slug: deepseek-v4-pro
        display_name: DeepSeek V4 Pro
        upstream_model: deepseek-v4-pro
        context_window: 131072
        input_modalities: [text]
      - slug: deepseek-v4-flash
        display_name: DeepSeek V4 Flash
        upstream_model: deepseek-v4-flash
        context_window: 131072
        input_modalities: [text]

  - id: cloudflare-workers-ai
    enabled: true
    endpoint: https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/ai/v1
    auth:
      type: env
      name: CLOUDFLARE_AUTH_TOKEN
    models:
      - slug: cloudflare-glm-5-2
        display_name: Cloudflare GLM 5.2
        upstream_model: "@cf/zai-org/glm-5.2"
        context_window: 131072
        input_modalities: [text]

  - id: ollama
    enabled: true
    endpoint: http://127.0.0.1:11434/v1
    models: []

  - id: chatgpt-codex
    enabled: false
    auth:
      type: external-codex-login

  - id: cursor-composer
    enabled: true
    auth:
      type: external-cli-login
      command: cursor-agent status

  - id: auto-router
    enabled: false
    slug: shimex-auto
    display_name: Auto Router
    threshold: 0.7
    candidates: []
